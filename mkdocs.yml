site_name: Mini-kurs Podstawy Markdown i Git
site_description: Profesjonalna dokumentacja szkoleniowa

theme:
  name: material
  # Dodanie profesjonalnych funkcji interfejsu
  features:
    - navigation.tabs          # Przenosi menu główne na górę jako zakładki
    - navigation.tabs.sticky   # Zakładki przyklejają się do góry przy przewijaniu
    - navigation.top           # Dodaje przycisk "Wróć na górę"
    - navigation.instant       # Płynne przejścia między stronami (brak przeładowań)
    - search.suggest           # Podpowiedzi w wyszukiwarce
    - search.highlight         # Podświetlanie szukanych słów
    - content.code.copy        # Magiczny przycisk "Kopiuj" w blokach kodu!
  # Czcionki z Google Fonts
  font:
    text: Roboto
    code: Fira Code
  # Konfiguracja trybu Jasny/Ciemny
  palette:
    # Tryb jasny
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/weather-night
        name: Przełącz na tryb ciemny
    # Tryb ciemny
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Przełącz na tryb jasny

extra_css:
  - stylesheets/custom.css

# Włączone rozszerzenia Markdown
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - attr_list

nav:
  - Strona Główna: index.md
  - Autorzy: autorzy.md
  - Teoria: teoria.md
  - Przykłady: przyklady.md